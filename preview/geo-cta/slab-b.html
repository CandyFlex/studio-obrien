<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Geo Slab B: The Band</title>
<link rel="stylesheet" href="/fonts.css">
<style>
  :root{--g:#34d399;--g-lite:#6ee7b7;--bg:#0a0a0b;--bg-2:#0e0f11;--surface:#141518;--surface-2:#1a1c20;--b:#25272d;--b-2:#33363d;--fg:#f4f5f6;--muted:#a4aab2;--dim:#767b83;--maxw:1240px;--ease:cubic-bezier(.16,1,.3,1)}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{background:var(--bg);-webkit-font-smoothing:antialiased}
  body{background:var(--bg);color:var(--fg);font-family:'Inter',sans-serif;line-height:1.65;overflow-x:hidden}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 clamp(18px,4vw,40px)}
  .stub{padding:40px 0;color:var(--dim);font-size:14px}
  a{color:inherit}
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

  /* Slab B: The Band */
  .slab{position:relative;background:var(--g);padding:clamp(40px,5vw,56px) 0;overflow:hidden}
  .slab::after{content:'';position:absolute;inset:0;pointer-events:none;mix-blend-mode:multiply;
    background:repeating-linear-gradient(-55deg,rgba(6,35,26,.05) 0 2px,transparent 2px 9px)}
  .slab .wrap{position:relative;z-index:1}

  .band{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:clamp(24px,3.5vw,44px)}
  .band-zone{padding:clamp(4px,1vw,10px) 0}

  .band-head{flex:1 1 300px}
  .band-head h2{font-family:'Inter Tight',sans-serif;font-weight:780;font-size:clamp(26px,3vw,40px);line-height:1.05;letter-spacing:-.035em;color:#06231a;text-wrap:balance;max-width:18ch}
  .band-head h2 em{font-style:italic;font-weight:540}

  .band-mid{flex:1 1 260px;position:relative;padding-left:clamp(24px,3.5vw,44px);border-left:1px solid rgba(6,35,26,.25)}
  .band-mid p{font-size:clamp(15px,1.5vw,17.5px);color:rgba(6,35,26,.78);line-height:1.55;max-width:34ch;text-wrap:pretty}

  .band-act{flex:0 0 auto;position:relative;padding-left:clamp(24px,3.5vw,44px);border-left:1px solid rgba(6,35,26,.25);display:flex;flex-direction:column;gap:10px;align-items:stretch}
  .band-act .note{font-size:13.5px;color:rgba(6,35,26,.65);margin-top:2px;max-width:24ch}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;font-family:'Inter',sans-serif;font-weight:700;font-size:15px;text-decoration:none;padding:13px 26px;border-radius:6px;min-height:50px;border:1px solid transparent;transition:transform .2s var(--ease),box-shadow .3s,background .2s,border-color .2s,color .2s}
  .btn svg{width:18px;height:18px;flex-shrink:0}
  .btn-inkfill{background:#06231a;color:#fff}
  .btn-inkfill:hover{transform:translateY(-2px);box-shadow:0 12px 34px rgba(6,35,26,.32)}
  .btn-inkline{background:transparent;color:#06231a;border-color:rgba(6,35,26,.4)}
  .btn-inkline:hover{border-color:#06231a;transform:translateY(-2px)}
  @media(prefers-reduced-motion:reduce){.btn:hover{transform:none}}

  @media(max-width:960px){
    .band{gap:clamp(20px,4vw,30px)}
    .band-mid,.band-act{padding-left:0;border-left:0}
    .band-head,.band-mid{flex-basis:100%}
    .band-mid{border-top:1px solid rgba(6,35,26,.25);padding-top:clamp(16px,3vw,22px)}
    .band-mid p{max-width:56ch}
    .band-act{flex-basis:100%}
  }
  @media(max-width:560px){
    .band-act .btn{width:100%}
  }
</style>
</head>
<body>
<div class="wrap stub">[ FAQ above ]</div>

<section class="slab">
  <div class="wrap">
    <div class="band">
      <div class="band-zone band-head">
        <h2 class="sr-only">Losing customers to a website that doesn't sell?</h2>
        <h2 aria-hidden="true">A website that <em>doesn't sell</em>?</h2>
      </div>
      <div class="band-zone band-mid">
        <p>Tell me what you're working with, and I'll show you what's possible.</p>
      </div>
      <div class="band-zone band-act">
        <a href="/contact" class="btn btn-inkfill">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          Start a project
        </a>
        <a href="tel:+17049743372" class="btn btn-inkline">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          (704) 974-3372
        </a>
        <p class="note">Free quote. Most builds launch in about 14 days.</p>
      </div>
    </div>
  </div>
</section>

<div class="wrap stub">[ footer below ]</div>
</body>
</html>
