name: IndexNow — Auto-Submit to Bing + Google

on:
  push:
    branches: [main]

jobs:
  indexnow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Submit to Bing IndexNow
        run: |
          KEY="53bb553e5cb97f89e5864d6645be836b"
          HOST="studioobrien.com"
          URLS=$(grep -oP '(?<=<loc>)[^<]+' sitemap.xml)
          JSON=$(jq -n \
            --arg host "$HOST" \
            --arg key "$KEY" \
            --arg keyloc "https://$HOST/$KEY.txt" \
            --argjson urls "$(echo "$URLS" | jq -R -s -c 'split("\n") | map(select(length > 0))')" \
            '{host: $host, key: $key, keyLocation: $keyloc, urlList: $urls}')
          echo "Submitting $(echo $URLS | wc -w) URLs to Bing IndexNow..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "https://www.bing.com/IndexNow" \
            -H "Content-Type: application/json" \
            -d "$JSON")
          echo "Bing response: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "IndexNow submission failed"
            curl -s -X POST "https://www.bing.com/IndexNow" \
              -H "Content-Type: application/json" \
              -d "$JSON"
            exit 1
          fi
          echo "IndexNow success — URLs being indexed by Bing"

      - name: Notify Google about sitemap update
        run: |
          echo "Pinging Google sitemap..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://www.google.com/ping?sitemap=https://studioobrien.com/sitemap.xml")
          echo "Google response: $STATUS"
