<!--
  Studio O'Brien - Minimal single-purpose nudge
  For the day-7 post-asset call offer, or a light "still happy to send it" bump.
  Almost plain-text, but branded: wordmark, thin mint rule, one short paragraph.
  Keep {{message}} short. Shorter than the message before it (section 8).
-->
<meta name="color-scheme" content="dark">
<meta name="supported-color-schemes" content="dark">
<style>
  body { margin: 0; padding: 0; }
  a { text-decoration: none; }
  @media only screen and (max-width: 600px) {
    .container { width: 100% !important; }
    .pad { padding-left: 22px !important; padding-right: 22px !important; }
  }
</style>

<div style="display:none;max-height:0;overflow:hidden;opacity:0;color:#0f0f10;">A quick note, nothing pushy.</div>

<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#0f0f10" style="background-color:#0f0f10;margin:0;padding:0;">
  <tr>
    <td align="center" bgcolor="#0f0f10" style="background-color:#0f0f10;padding:32px 12px;">

      <table role="presentation" class="container" width="600" cellpadding="0" cellspacing="0" border="0" bgcolor="#0f0f10" style="width:600px;max-width:600px;background-color:#0f0f10;">

        <!-- HEADER: wordmark + thin mint rule -->
        <tr>
          <td class="pad" bgcolor="#0f0f10" style="background-color:#0f0f10;padding:8px 40px 0 40px;">
            <div style="font-family:Inter,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;font-size:15px;font-weight:700;letter-spacing:-0.02em;color:#ffffff;">STUDIO O'BRIEN</div>
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-top:14px;">
              <tr><td height="1" bgcolor="#34d399" style="height:1px;background-color:#34d399;font-size:0;line-height:1px;mso-line-height-rule:exactly;">&nbsp;</td></tr>
            </table>
          </td>
        </tr>

        <!-- MESSAGE -->
        <tr>
          <td class="pad" bgcolor="#0f0f10" style="background-color:#0f0f10;padding:28px 40px 0 40px;">
            <p style="font-family:Inter,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;font-size:16px;line-height:1.65;color:#d4d4d4;margin:0;">Hi {{ownerFirstName}}, {{message}}</p>
          </td>
        </tr>

        <!-- SIGNATURE -->
        <tr>
          <td class="pad" bgcolor="#0f0f10" style="background-color:#0f0f10;padding:28px 40px 8px 40px;">
            <div style="font-family:Inter,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;font-size:15px;line-height:1.55;color:#ffffff;font-weight:600;">Jarred O'Brien</div>
            <div style="font-family:Inter,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;font-size:14px;line-height:1.6;color:#888888;">Studio O'Brien, Shelby NC<br>
              <a href="https://studioobrien.com" style="color:#34d399;text-decoration:none;">studioobrien.com</a>&nbsp;&nbsp;&middot;&nbsp;&nbsp;<a href="tel:+17049743372" style="color:#888888;text-decoration:none;">704-974-3372</a>
            </div>
          </td>
        </tr>

        <!-- FOOTER MARK -->
        <tr>
          <td class="pad" bgcolor="#0f0f10" style="background-color:#0f0f10;padding:26px 40px 20px 40px;">
            <div style="font-family:Inter,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;font-size:12px;line-height:1.5;color:#666666;">Studio O'Brien &middot; Shelby, North Carolina. Reply "stop" and I will close the file, no hard feelings.</div>
          </td>
        </tr>

      </table>
    </td>
  </tr>
</table>
