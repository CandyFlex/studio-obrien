<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carolina Arcade Museum - V3 LOCKED</title>
  <meta name="color-scheme" content="dark">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --black: #0a0a0a;
      --yellow: #f5d623;
      --red: #e8342e;
      --cyan: #00d4ff;
      --green: #39ff14;
      --white: #f0f0f0;
      --gray: #888;
      --font-pixel: 'Press Start 2P', monospace;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-pixel);
      background: var(--black);
      color: var(--white);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    .hero {
      min-height: 100vh;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-bg {
      position: absolute; inset: 0;
      background: url('/mock-sites/assets/carolina-arcade/hero-interior-wide.webp') center center / cover no-repeat;
      z-index: 0;
    }
    .hero-bg::after {
      content: ''; position: absolute; inset: 0;
      background: rgba(10,10,10,0.82);
    }

    .hero::before {
      content: ''; position: absolute; inset: 0;
      pointer-events: none; z-index: 50;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px);
    }

    .orbit-wrap {
      position: relative; z-index: 5;
      width: 100%; max-width: 1200px;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }

    .center {
      display: flex; flex-direction: column; align-items: center;
      gap: 20px; position: relative; z-index: 3;
    }

    .logo-img {
      display: block;
      width: min(740px, 78vw);
      filter: drop-shadow(0 0 40px rgba(245,214,35,0.25));
    }

    .chip {
      position: absolute; z-index: 4;
      text-align: center; min-width: 120px;
    }

    /* V3 LOCKED: top/bot 8%, mid 1% */
    .c1 { top: 18%; left: 8%; }
    .c3 { top: 43%; left: 1%; }
    .c5 { bottom: 22%; left: 8%; }
    .c2 { top: 18%; right: 8%; }
    .c4 { top: 43%; right: 1%; }
    .c6 { bottom: 22%; right: 8%; }

    .chip .chip-val {
      font-family: var(--font-pixel);
      font-size: 1.5rem;
      margin-bottom: 4px;
    }
    .chip .chip-lbl {
      font-family: var(--font-pixel);
      font-size: 0.5rem;
      color: #bbb;
      text-transform: uppercase;
      letter-spacing: 2px;
      line-height: 1.5;
    }

    .accent-yellow { color: var(--yellow); }
    .accent-cyan { color: var(--cyan); }
    .accent-green { color: var(--green); }
    .accent-red { color: var(--red); }
    .glow-yellow { text-shadow: 0 0 20px rgba(245,214,35,0.3); }
    .glow-cyan { text-shadow: 0 0 20px rgba(0,212,255,0.3); }
    .glow-green { text-shadow: 0 0 20px rgba(57,255,20,0.3); }

    .badge-row { display: flex; align-items: center; gap: 8px; }
    .badge-row img { width: 40px; height: 40px; border-radius: 4px; }

    .tagline {
      font-family: var(--font-pixel);
      font-size: 0.8rem;
      color: var(--cyan);
      text-transform: uppercase;
      letter-spacing: 4px;
      text-align: center;
    }

    .cta-btn {
      display: inline-block;
      font-family: var(--font-pixel);
      font-size: 0.85rem;
      background: var(--red);
      color: var(--white);
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 2px;
      padding: 1rem 2.2rem;
      border: none; cursor: pointer;
      box-shadow: 0 0 25px rgba(232,52,46,0.3);
      transition: transform 0.15s;
    }
    .cta-btn:hover { transform: translateY(-2px); }

    @media (max-width: 1200px) {
      .chip { min-width: 100px; }
      .chip .chip-val { font-size: 1.2rem; }
      .chip .chip-lbl { font-size: 0.42rem; }
    }

    @media (max-width: 900px) {
      .chip { display: none; }
      .logo-img { width: min(420px, 80vw); }
    }

    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation: none !important; transition-duration: 0s !important; } }
  </style>
</head>
<body>

<section class="hero">
  <div class="hero-bg"></div>
  <div class="orbit-wrap">

    <div class="chip c1">
      <div class="chip-val accent-green glow-green">105+</div>
      <div class="chip-lbl">Playable<br>Machines</div>
    </div>
    <div class="chip c3">
      <div class="chip-val accent-cyan glow-cyan">2</div>
      <div class="chip-lbl">Floors of<br>Gaming</div>
    </div>
    <div class="chip c5">
      <div class="chip-val accent-yellow">2018</div>
      <div class="chip-lbl">Est. Forest<br>City, NC</div>
    </div>

    <div class="chip c2">
      <div class="chip-val accent-yellow glow-yellow">$13</div>
      <div class="chip-lbl">All Day<br>Pass</div>
    </div>
    <div class="chip c4">
      <div class="chip-val accent-red" style="letter-spacing:-1px;">4.9<span style="font-size:1.2rem;vertical-align:middle;margin-left:2px;">&#11088;</span></div>
      <div class="chip-lbl">Google<br>Rating</div>
    </div>
    <div class="chip c6">
      <div class="badge-row" style="justify-content:center;">
        <img src="https://img.logo.dev/pbs.org?token=pk_R8_8hLshSwmse1iaY7Qzww&size=40&format=png" alt="PBS">
      </div>
      <div class="chip-lbl" style="margin-top:10px;">As Seen<br>on PBS</div>
    </div>

    <div class="center">
      <img src="/mock-sites/assets/carolina-arcade/logo-wide.webp" alt="Carolina Arcade Museum" class="logo-img">
      <p class="tagline">100+ classics. Two floors. Zero quarters.</p>
      <a href="#" class="cta-btn">Come Play &rarr;</a>
    </div>
  </div>
</section>

</body>
</html>
