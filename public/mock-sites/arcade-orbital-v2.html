<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carolina Arcade Museum - Mobile Concave Variants</title>
  <meta name="color-scheme" content="dark">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --black: #0a0a0a;
      --yellow: #f5d623;
      --red: #e8342e;
      --cyan: #00d4ff;
      --green: #39ff14;
      --white: #f0f0f0;
      --gray: #888;
      --font-pixel: 'Press Start 2P', monospace;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-pixel);
      background: var(--black);
      color: var(--white);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      padding-bottom: 0;
    }

    /* ===== HERO ===== */
    .hero {
      min-height: 100vh;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-bg {
      position: absolute; inset: 0;
      background: url('/mock-sites/assets/carolina-arcade/hero-interior-wide.webp') center center / cover no-repeat;
      z-index: 0;
    }
    .hero-bg::after {
      content: ''; position: absolute; inset: 0;
      background: rgba(10,10,10,0.82);
    }

    .hero::before {
      content: ''; position: absolute; inset: 0;
      pointer-events: none; z-index: 50;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px);
    }

    /* ===== DESKTOP ORBITAL ===== */
    .orbit-wrap {
      position: relative; z-index: 5;
      width: 100%; max-width: 1200px;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }

    .center {
      display: flex; flex-direction: column; align-items: center;
      gap: 0; position: relative; z-index: 3;
    }

    .logo-img {
      display: block;
      width: min(800px, 82vw);
      filter: drop-shadow(0 0 40px rgba(245,214,35,0.25));
      margin-bottom: 24px;
    }

    .chip {
      position: absolute; z-index: 4;
      text-align: center; min-width: 120px;
    }

    /* Desktop positions locked */
    .c1 { top: 18%; left: 8%; }
    .c5 { bottom: 22%; left: 8%; }
    .c2 { top: 18%; right: 8%; }
    .c6 { bottom: 22%; right: 8%; }
    .c3 { top: 43%; left: 1%; }
    .c4 { top: 43%; right: 1%; }

    .chip .chip-val {
      font-family: var(--font-pixel);
      font-size: 1.5rem;
      margin-bottom: 4px;
    }
    .chip .chip-lbl {
      font-family: var(--font-pixel);
      font-size: 0.5rem;
      color: #bbb;
      text-transform: uppercase;
      letter-spacing: 2px;
      line-height: 1.5;
    }

    .accent-yellow { color: var(--yellow); }
    .accent-cyan { color: var(--cyan); }
    .accent-green { color: var(--green); }
    .accent-red { color: var(--red); }
    .glow-yellow { text-shadow: 0 0 20px rgba(245,214,35,0.3); }
    .glow-cyan { text-shadow: 0 0 20px rgba(0,212,255,0.3); }
    .glow-green { text-shadow: 0 0 20px rgba(57,255,20,0.3); }

    .google-circle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px; height: 44px;
      background: #fff;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .google-icon { width: 28px; height: 28px; }

    .badge-row { display: flex; align-items: center; gap: 8px; }
    .badge-row img { width: 40px; height: 40px; border-radius: 4px; }

    .tagline {
      font-family: var(--font-pixel);
      font-size: 0.65rem;
      color: var(--cyan);
      text-transform: uppercase;
      letter-spacing: 3px;
      text-align: center;
      margin-bottom: 48px;
    }

    /* ===== CTA BUTTONS ===== */
    .cta-row {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .cta-primary {
      display: inline-block;
      font-family: var(--font-pixel);
      font-size: 0.55rem;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      background: var(--yellow);
      color: var(--black);
      border: 3px solid #c9a200;
      border-radius: 50px;
      padding: 0.6rem 1.5rem;
      box-shadow: 0 4px 0 #8a7100, 0 0 25px rgba(245,214,35,0.3);
    }
    .cta-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 0 #8a7100, 0 0 40px rgba(245,214,35,0.45);
    }
    .cta-primary:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #8a7100;
    }

    .cta-secondary {
      display: inline-block;
      font-family: var(--font-pixel);
      font-size: 0.55rem;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
      background: transparent;
      color: #ccc;
      border: 3px solid rgba(255,255,255,0.2);
      border-radius: 50px;
      padding: 0.6rem 1.5rem;
      box-shadow: none;
    }
    .cta-secondary:hover {
      transform: translateY(-2px);
      border-color: rgba(255,255,255,0.4);
      color: #fff;
      box-shadow: 0 0 15px rgba(255,255,255,0.08);
    }

    /* ===== TABLET (900–1200px) — concave top/bottom, bridging desktop to mobile ===== */
    @media (max-width: 1200px) and (min-width: 901px) {
      .chip { min-width: 90px; }
      .chip .chip-val { font-size: 1.1rem; }
      .chip .chip-lbl { font-size: 0.38rem; letter-spacing: 1px; }
      .google-icon { width: 20px; height: 20px; }
      .google-circle { width: 34px; height: 34px; }
      .badge-row img { width: 34px; height: 34px; }
      .logo-img { width: min(520px, 58vw); }
      .tagline { font-size: 0.55rem; letter-spacing: 3px; margin-bottom: 32px; }
      .cta-primary { font-size: 0.5rem; padding: 0.55rem 1.4rem; }
      .cta-secondary { font-size: 0.5rem; padding: 0.55rem 1.4rem; }

      /* Top row concave: sides 20%, center 14% */
      .c1 { top: 20%; left: 5%; }
      .c2 { top: 14%; left: 50%; right: auto; transform: translateX(-50%); }
      .c3 { top: 20%; right: 5%; left: auto; }

      /* Bottom row concave: sides 20%, center 14% */
      .c5 { bottom: 20%; left: 5%; top: auto; }
      .c4 { bottom: 14%; left: 50%; right: auto; top: auto; transform: translateX(-50%); }
      .c6 { bottom: 20%; right: 5%; top: auto; }
    }

    /* ==============================================
       MOBILE (under 900px) — CONCAVE TOP/BOTTOM
       Top row: c1 (105+), c2 ($13), c3 (Google)
       Bottom row: c5 (2018), c4 (2 Floors), c6 (PBS)
       Icons split: Google top-right, PBS bottom-right
       ============================================== */

    @media (max-width: 900px) {
      .orbit-wrap {
        min-height: 100vh;
        min-height: 100svh;
      }
      .logo-img {
        width: calc(100vw - 20px);
        max-width: 460px;
        margin-bottom: 14px;
      }
      .chip { min-width: auto; transition: top 0.3s, bottom 0.3s, left 0.3s, right 0.3s; }
      .chip .chip-val { font-size: 1.25rem; }
      .chip .chip-lbl { font-size: 0.42rem; letter-spacing: 1px; }
      .google-circle { width: 38px; height: 38px; }
      .google-icon { width: 24px; height: 24px; }
      .badge-row img { width: 38px; height: 38px; }
      .tagline {
        font-size: 0.5rem;
        letter-spacing: 2px;
        margin-bottom: 24px;
        line-height: 1.8;
      }
      .cta-primary { font-size: 0.5rem; padding: 0.6rem 1.3rem; }
      .cta-secondary { font-size: 0.5rem; padding: 0.6rem 1.3rem; }
      .cta-row { gap: 12px; }

      /* Top row: c1 left, c2 center, c3 right */
      .c1 { left: var(--h-edge); top: var(--top-side); right: auto; bottom: auto; transform: none; }
      .c2 { left: 50%; top: var(--top-center); right: auto; bottom: auto; transform: translateX(-50%); }
      .c3 { right: var(--h-edge); top: var(--top-side); left: auto; bottom: auto; transform: none; }

      /* Bottom row: c5 left, c4 center, c6 right */
      .c5 { left: var(--h-edge); bottom: var(--bot-side); right: auto; top: auto; transform: none; }
      .c4 { left: 50%; bottom: var(--bot-center); right: auto; top: auto; transform: translateX(-50%); }
      .c6 { right: var(--h-edge); bottom: var(--bot-side); left: auto; top: auto; transform: none; }
    }

    /* Mobile positions locked — V3 */
    @media (max-width: 900px) {
      .orbit-wrap {
        --top-side: 25%;
        --top-center: 16%;
        --bot-side: 25%;
        --bot-center: 16%;
        --h-edge: 3%;
      }
    }

    /* ===== EXTRA SMALL (under 480px) ===== */
    @media (max-width: 480px) {
      .logo-img { width: calc(100vw - 20px); max-width: 360px; }
      .chip .chip-val { font-size: 1.1rem; }
      .chip .chip-lbl { font-size: 0.38rem; }
      .tagline { font-size: 0.42rem; letter-spacing: 1px; }
      .cta-primary { font-size: 0.42rem; padding: 0.5rem 1.1rem; }
      .cta-secondary { font-size: 0.42rem; padding: 0.5rem 1.1rem; }
      .cta-row { gap: 10px; }
      .google-circle { width: 34px; height: 34px; }
      .google-icon { width: 20px; height: 20px; }
      .badge-row img { width: 34px; height: 34px; }
    }

    /* ===== PICKER BAR ===== */
    .picker {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 9999;
      background: rgba(10,10,10,0.96); backdrop-filter: blur(16px);
      padding: 14px 20px;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      border-top: 2px solid #222;
    }
    .picker-label {
      font-family: var(--font-pixel);
      font-size: 0.4rem; color: var(--gray);
      text-transform: uppercase; letter-spacing: 2px; margin-right: 12px;
    }
    .pick-btn {
      min-width: 40px; height: 38px;
      border: 2px solid #333; background: transparent; color: #888;
      font-family: var(--font-pixel); font-size: 0.5rem;
      cursor: pointer; padding: 0 10px;
      transition: border-color 0.15s, color 0.15s;
    }
    .pick-btn:hover { border-color: #555; color: #ccc; }
    .pick-btn.active { border-color: var(--yellow); color: var(--yellow); background: rgba(245,214,35,0.08); }
    .picker-desc {
      font-family: var(--font-pixel);
      font-size: 0.32rem; color: #666; margin-left: 12px;
      text-transform: uppercase; letter-spacing: 1px;
      max-width: 500px;
    }

    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation: none !important; transition-duration: 0s !important; } }
  </style>
</head>
<body>

<section class="hero">
  <div class="hero-bg"></div>
  <div class="orbit-wrap">

    <!-- TOP ROW on mobile: c1 left, c2 center, c3 right -->
    <div class="chip c1">
      <div class="chip-val accent-green glow-green">105+</div>
      <div class="chip-lbl">Playable<br>Machines</div>
    </div>
    <div class="chip c2">
      <div class="chip-val accent-yellow glow-yellow">$13</div>
      <div class="chip-lbl">All Day<br>Pass</div>
    </div>
    <div class="chip c3">
      <div style="margin-bottom:8px;display:flex;justify-content:center;">
        <span class="google-circle"><img src="https://img.logo.dev/google.com?token=pk_R8_8hLshSwmse1iaY7Qzww&size=28&format=png" alt="Google" class="google-icon"></span>
      </div>
      <div class="chip-val accent-red" style="letter-spacing:-2px;">4.9</div>
      <div class="chip-lbl">Google<br>Rating</div>
    </div>

    <!-- BOTTOM ROW on mobile: c5 left, c4 center, c6 right -->
    <div class="chip c4">
      <div class="chip-val accent-cyan glow-cyan">2</div>
      <div class="chip-lbl">Floors of<br>Gaming</div>
    </div>
    <div class="chip c5">
      <div class="chip-val accent-yellow">2018</div>
      <div class="chip-lbl">Est. Forest<br>City, NC</div>
    </div>
    <div class="chip c6">
      <div class="badge-row" style="justify-content:center;">
        <img src="https://img.logo.dev/pbs.org?token=pk_R8_8hLshSwmse1iaY7Qzww&size=40&format=png" alt="PBS">
      </div>
      <div class="chip-lbl" style="margin-top:10px;">As Seen<br>on PBS</div>
    </div>

    <!-- Center -->
    <div class="center">
      <img src="/mock-sites/assets/carolina-arcade/logo-wide.webp" alt="Carolina Arcade Museum" class="logo-img">
      <p class="tagline">100+ classics. Two floors. Zero quarters.</p>
      <div class="cta-row">
        <a href="#" class="cta-primary">Press Start</a>
        <a href="#" class="cta-secondary">Plan Your Visit</a>
      </div>
    </div>
  </div>
</section>


</body>
</html>
